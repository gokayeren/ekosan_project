<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekosan Panel - Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] flex items-center justify-center min-h-screen p-4 font-sans text-slate-200">
    
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-100 tracking-tight">EKOSAN</h1>
            <p class="text-slate-500 mt-1">Yönetim Paneli Girişi</p>
        </div>

        <div class="bg-[#0f172a] rounded-xl border border-slate-800 overflow-hidden shadow-2xl p-8 relative">
            
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 rounded border border-indigo-500/20 bg-indigo-900/20 flex items-center justify-center text-indigo-400 shadow-inner">
                    <i class="fa fa-user-shield text-2xl"></i>
                </div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="mb-6 px-4 py-3 rounded text-sm flex items-center gap-3
                      {% if category == 'danger' or category == 'error' %}
                          bg-red-500/10 border border-red-500/20 text-red-400
                      {% elif category == 'success' %}
                          bg-emerald-500/10 border border-emerald-500/20 text-emerald-400
                      {% else %}
                          bg-blue-500/10 border border-blue-500/20 text-blue-400
                      {% endif %}
                  ">
                      <i class="fa fa-exclamation-circle"></i>
                      <span>{{ message }}</span>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="">
                <div class="mb-5">
                    <label class="block text-sm font-medium text-slate-400 mb-2">Kullanıcı Adı</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                            <i class="fa fa-user"></i>
                        </div>
                        <input type="text" name="username" class="w-full bg-[#020617] border border-slate-700 rounded pl-10 pr-4 py-2.5 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" placeholder="Kullanıcı adınızı girin" required autofocus>
                    </div>
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-400 mb-2">Şifre</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                            <i class="fa fa-lock"></i>
                        </div>
                        <input type="password" name="password" class="w-full bg-[#020617] border border-slate-700 rounded pl-10 pr-4 py-2.5 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors" placeholder="Şifrenizi girin" required>
                    </div>
                </div>
                
                <button type="submit" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 rounded transition-colors shadow-lg shadow-blue-900/20 border-0 cursor-pointer">
                    <i class="fa fa-sign-in-alt"></i> Sisteme Giriş Yap
                </button>
            </form>
            
        </div>
        
        <div class="text-center mt-6 text-xs text-slate-600">
            &copy; 2024 Ekosan Mühendislik. Tüm hakları saklıdır.
        </div>
    </div>
</body>
</html>
